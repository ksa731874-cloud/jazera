kind = "web"
previewPath = "/"
title = "الجزيرة للتمويل والحلول المالية"
version = "1.0.0"
id = "artifacts/jazeera-finance"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20392

[services.development]
run = "pnpm --filter @workspace/jazeera-finance run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/jazeera-finance", "run", "build" ]
publicDir = "artifacts/jazeera-finance/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20392"
BASE_PATH = "/"
